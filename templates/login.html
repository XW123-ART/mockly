<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockly - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #f0f0f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        /* 背景水印 */
        .watermark-container {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            pointer-events: none;
            z-index: 1;
        }

        .watermark-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-wrap: wrap;
            transform: rotate(-12deg);
            align-content: flex-start;
        }

        .watermark-upper { z-index: 2; }
        .watermark-upper .watermark-text { color: #ddd; }
        .watermark-lower { z-index: 1; margin-left: 30px; margin-top: 20px; }
        .watermark-lower .watermark-text { color: #999; }

        .watermark-text {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 6px;
            padding: 35px 50px;
            white-space: nowrap;
            user-select: none;
        }

        /* 主内容 */
        .main-content {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* 登录卡片 */
        .login-card {
            background: white;
            padding: 50px 60px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            width: 400px;
            max-width: 90%;
            z-index: 20;
        }

        .login-title {
            font-size: 28px;
            font-weight: 600;
            color: #1a1a1a;
            text-align: center;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        /* 输入框组 */
        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .form-input:focus {
            outline: none;
            border-color: #1a1a1a;
            background: white;
        }

        /* 登录按钮 */
        .login-btn {
            width: 100%;
            padding: 16px;
            background: #1a1a1a;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #333;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        /* 错误提示 */
        .error-msg {
            background: #ffebee;
            color: #c62828;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
        }

        /* 副标题 */
        .subtitle {
            position: fixed;
            left: 40px;
            bottom: 40px;
            font-size: 12px;
            color: #000;
            font-weight: 400;
            letter-spacing: 0.1em;
            z-index: 20;
        }

        /* 装饰 */
        .decor-line {
            position: absolute;
            width: 1px;
            height: 120px;
            background: linear-gradient(to bottom, transparent, #bbb, transparent);
            z-index: 5;
        }
        .decor-line.left { left: 12%; top: 50%; transform: translateY(-50%); }
        .decor-line.right { right: 12%; top: 50%; transform: translateY(-50%); }

        .corner-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #bbb;
            border-radius: 50%;
            z-index: 5;
        }
        .corner-dot.tl { top: 18%; left: 8%; }
        .corner-dot.tr { top: 18%; right: 8%; }
        .corner-dot.bl { bottom: 18%; left: 8%; }
        .corner-dot.br { bottom: 18%; right: 8%; }

        @media (max-width: 768px) {
            .watermark-text { font-size: 14px; padding: 25px 35px; }
            .login-card { padding: 40px 30px; }
            .login-title { font-size: 24px; }
            .subtitle { left: 20px; bottom: 20px; font-size: 11px; }
        }
    </style>
</head>
<body>
    <!-- 背景水印 -->
    <div class="watermark-container">
        <div class="watermark-layer watermark-lower" id="watermarkLower"></div>
        <div class="watermark-layer watermark-upper" id="watermarkUpper"></div>
    </div>

    <!-- 装饰 -->
    <div class="decor-line left"></div>
    <div class="decor-line right"></div>
    <div class="corner-dot tl"></div>
    <div class="corner-dot tr"></div>
    <div class="corner-dot bl"></div>
    <div class="corner-dot br"></div>

    <!-- 登录卡片 -->
    <div class="main-content">
        <div class="login-card">
            <h1 class="login-title">用户登录</h1>

            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" name="username" class="form-input" placeholder="请输入用户名" required>
                </div>

                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" name="password" class="form-input" placeholder="请输入密码" required>
                </div>

                <button type="submit" class="login-btn">登 录</button>
            </form>
        </div>

        <div class="subtitle">智能测试数据生成工具</div>
    </div>

    <script>
        // 生成水印
        function generateWatermarks() {
            const lower = document.getElementById('watermarkLower');
            const upper = document.getElementById('watermarkUpper');
            const text = 'Mockly';
            const count = 300;

            for (let i = 0; i < count; i++) {
                const span1 = document.createElement('span');
                span1.className = 'watermark-text';
                span1.textContent = text;
                lower.appendChild(span1);

                const span2 = document.createElement('span');
                span2.className = 'watermark-text';
                span2.textContent = text;
                upper.appendChild(span2);
            }
        }
        generateWatermarks();

        // 页面加载动画
        window.addEventListener('DOMContentLoaded', () => {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.6s ease';
            requestAnimationFrame(() => document.body.style.opacity = '1');
        });
    </script>
</body>
</html>
